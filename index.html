<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Top Club Starting XIs &rarr; FIFA National Teams</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <button id="logo" title="Home"><span class="ball">⚽</span> FIFA <em>Lineups</em></button>
    <div id="hbar"></div>
  </header>
  <main>
    <nav id="rail" aria-label="Clubs"></nav>
    <section id="stage">
      <div id="banner"></div>
      <div id="pitch-wrap">
        <aside id="bench"></aside>
        <div id="pitch"></div>
      </div>
      <div id="list" hidden></div>
      <div id="home" hidden></div>
    </section>
    <nav id="nrail" aria-label="National teams"></nav>
  </main>
  <!-- Vercel Web Analytics (plain-HTML integration; no framework in this app) -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script src="data.js"></script>
  <script src="images.js"></script>
  <script src="bios.js"></script>
  <script src="wc.js"></script>
  <script src="app.js"></script>
</body>
</html>
